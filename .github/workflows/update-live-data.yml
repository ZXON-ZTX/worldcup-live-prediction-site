name: Update live match data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update-live-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate live data
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_SPORT_KEY: ${{ vars.ODDS_SPORT_KEY }}
          ODDS_REGIONS: ${{ vars.ODDS_REGIONS }}
        run: python scripts/update_live_data.py

      - name: Commit live data changes
        run: |
          if git diff --quiet live-data.json; then
            echo "No live data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-data.json
          git commit -m "Update live match data"
          git push
