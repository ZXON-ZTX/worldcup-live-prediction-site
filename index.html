<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>世界杯小组赛实时预测比分</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="top-panel">
      <div class="visual-strip" aria-hidden="true"></div>
      <div class="headline">
        <div>
          <p class="eyebrow">2026 FIFA World Cup · Group Stage Predictor</p>
          <h1>世界杯小组赛实时预测比分</h1>
        </div>
        <div class="clock-card">
          <span>本地时间</span>
          <strong id="clock">--:--:--</strong>
        </div>
      </div>
      <div class="metric-grid">
        <article>
          <span>覆盖比赛</span>
          <strong id="matchCount">0</strong>
        </article>
        <article>
          <span>当前筛选</span>
          <strong id="visibleCount">0</strong>
        </article>
        <article>
          <span>下一场</span>
          <strong id="nextMatch">待计算</strong>
        </article>
        <article>
          <span>模型更新</span>
          <strong id="updatedAt">--</strong>
        </article>
      </div>
    </section>

    <section class="toolbar" aria-label="筛选">
      <div class="search-box">
        <span aria-hidden="true">⌕</span>
        <input id="searchInput" type="search" placeholder="搜索球队、比赛或盘口关键词" />
      </div>
      <div class="control-row">
        <div class="segmented" id="groupFilters" role="tablist" aria-label="小组筛选"></div>
        <div class="segmented compact" id="statusFilters" role="tablist" aria-label="状态筛选">
          <button class="active" data-status="all">全部</button>
          <button data-status="upcoming">未开赛</button>
          <button data-status="live">赛中录入</button>
          <button data-status="finished">已结束</button>
        </div>
      </div>
      <div class="model-note" id="sourceNote"></div>
    </section>

    <section class="content-grid">
      <aside class="standings-panel">
        <div class="panel-head">
          <h2>小组预测排名</h2>
          <span id="standingsGroup">A组</span>
        </div>
        <div id="standingsList" class="standings-list"></div>
      </aside>
      <section class="matches-panel">
        <div class="panel-head">
          <h2>比赛预测</h2>
          <button class="icon-button" id="resetLive" title="清空所有赛中录入" aria-label="清空所有赛中录入">↺</button>
        </div>
        <div id="matchesGrid" class="matches-grid"></div>
      </section>
    </section>
  </main>

  <template id="matchTemplate">
    <article class="match-card">
      <div class="card-top">
        <span class="group-pill"></span>
        <span class="date-text"></span>
      </div>
      <div class="teams">
        <div class="team home-team"></div>
        <div class="score-block">
          <span class="base-label">赛前预测</span>
          <strong class="base-score"></strong>
          <span class="live-label">实时修正</span>
          <strong class="live-score"></strong>
        </div>
        <div class="team away-team"></div>
      </div>
      <div class="confidence-row">
        <span class="confidence"></span>
        <span class="outcome"></span>
      </div>
      <p class="market"></p>
      <p class="rationale"></p>
      <div class="live-editor">
        <label>分钟 <input class="minute-input" type="number" min="0" max="130" step="1" placeholder="0" /></label>
        <label>主队 <input class="home-input" type="number" min="0" max="20" step="1" placeholder="0" /></label>
        <label>客队 <input class="away-input" type="number" min="0" max="20" step="1" placeholder="0" /></label>
      </div>
    </article>
  </template>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
